apiVersion: v1
kind: ConfigMap
metadata:
  name: secret2ssl-config
  namespace: devops
data:
  config.yaml: |
    # 多 aliyun 配置项（每个配置项可同步多个 secrets）
    aliyun_configs:
      - name: account-a
        aliyun:
          # 建议留空，通过 credential_secret 从 Kubernetes Secret 注入
          access_key_id: ""
          access_key_secret: ""
          region: cn-hangzhou
          # 外网 endpoint（use_internal_endpoint=false 时生效）
          ssl_endpoint: cas.aliyuncs.com
          # 内网 endpoint（use_internal_endpoint=true 时优先使用，留空则自动使用 cas-vpc.<region>.aliyuncs.com）
          ssl_internal_endpoint: ""
          # 是否使用内网 endpoint
          use_internal_endpoint: false
          # 阿里云凭证来源（Kubernetes Secret）
          credential_secret:
            namespace: medeval-dev
            name: aliyun-cas-credential-a
            access_key_id_key: access_key_id
            access_key_secret_key: access_key_secret
        secrets:
          - name: model-dev.openxlab.org.cn-tls
            namespace: medeval-dev
            ali_ssl_name: model-dev.openxlab.org.cn-tls
          - name: model-dev.openxlab.org.cn-tls-backup
            namespace: medeval-dev
            ali_ssl_name: model-dev.openxlab.org.cn-tls-backup
    # kubernetes 配置项
    kubernetes:
      # kubeconfig 方式（本地开发使用）
      kubeconfig: "/Users/Zhuanz/.kube/p-cluster-prod"
      # in-cluster 方式（Pod 内运行使用，自动使用 ServiceAccount）,优先级高于kubeconfig
      in_cluster: false
      # 重试/重连等待时间（秒）
      resync_period: 30
    # 日志配置项
    logging:
      level: info
      format: json