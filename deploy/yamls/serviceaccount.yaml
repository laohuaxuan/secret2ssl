apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret2ssl
  namespace: devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret2ssl-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret2ssl-secret-reader-binding
subjects:
  - kind: ServiceAccount
    name: secret2ssl
    namespace: devops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret2ssl-secret-reader
